services:
  - type: web
    name: drc-minerals-api
    runtime: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drc-minerals-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false

databases:
  - name: drc-minerals-db
    databaseName: drc_minerals
    user: postgres